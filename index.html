<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@100..900&display=swap" rel="stylesheet">
  <link rel="icon" href="assets/favicon.png" type="image/png">
  <link rel="stylesheet" href="dist/index.css">
  <title>Live Streaming</title>
</head>
<body>
  <header class="header" aria-label="header">
    <div class="container">
      <div class="header__nav nav" aria-label="header navigation">
        <div class="nav__title">
          <a href="#" class="nav__title-link">CLOUD <span>FLEX</span></a>
        </div>
        
        <div class="nav__links">
          <ul class="nav__link-list list">
            <li class="list__item">
              <a href="#" class="list__item-link">about</a>
            </li>
            <li class="list__item">
              <a href="#" class="list__item-link">contact</a>
            </li>
          </ul>
        </div>

        <div class="nav__covid-wrapper covid">
        <a href="#" class="covid__link">COVID-19 UPDATE</a>
        </div>

        <div class="nav__globe-wrapper globe">
          <a href="#" class="globe__link">
            <svg class="globe__link-icon">
              <use href="/assets/sprites.svg#globe-icon"></use>
            </svg>
          </a>
        </div>

      </div>
    </div>
  </header>
  <main>
    <section class="hero-section">
      <div class="container">
        <div class="hero">
          <div class="hero__contein">
            <h class="hero__title">WHEN PERFORMANCE MATTERS</h>
            <button class="hero__action-btn">Start development with us!</button>
          </div>

          <div class="hero__notify">
            <img src="assets/img/pigeon_alpha.png" alt="pigeon img" class="hero__notify-img">
            <p class="hero__notify-content">WE USE COOKIES TO ENSURE YOUR BEST EXPERIENCE.<br>
              THROUGH YOUR CONTINUED USE OF THIS SITE YOU ACCEPT THIS USE.
              FOR MORE INFORMATION, PLEASE SEE OUR PRIVACY POLICY.</p>
            <button class="hero__notify-btn">ACCEPT</button>
          </div>

          <div class="hero__scroll">
            <span class="hero__scroll-content">
              Scroll down
            </span>
          </div>
        </div>
      </div>
    </section>

    <section class="work-section">
      <div class="container">
        <div class="work">
          <div class="work__title">How we work</div>
          <div class="work__cards-wrapper">
            
            <figure class="info-card card_bulb">
              <svg class="info-card__icon icon_bulb">
                <use href="/assets/sprites.svg#bulb-icon"></use>
              </svg>
              <h3 class="info-card__title">Analysis</h3>
              <div class="info-card__description">
                Gathering client's ideas we are happy to help with a technical vision.
              </div>
            </figure>

            <figure class="info-card card_desine">
              <svg class="info-card__icon icon_desine">
                <use href="/assets/sprites.svg#design-icon"></use>
              </svg>
              <h3 class="info-card__title">Design</h3>
              <div class="info-card__description">
                In-depth analysis makes our solutions flexible, scalable and robust.
              </div>
            </figure>

            <figure class="info-card card_dev">
              <svg class="info-card__icon icon_dev">
                <use href="/assets/sprites.svg#dev-icon"></use>
              </svg>
              <h3 class="info-card__title">Development</h3>
              <div class="info-card__description">
                Using best practices to make reliable, well-documented and easy to maintain system.
              </div>
            </figure>

            <figure class="info-card card_maintenance">
              <svg class="info-card__icon icon_maintenance">
                <use href="/assets/sprites.svg#maintenance-icon"></use>
              </svg>
              <h3 class="info-card__title">Maintenance</h3>
              <div class="info-card__description">
                Gathering client's ideas we are happy to help with a technical vision.
              </div>
            </figure>

            <figure class="info-card card_testing">
              <svg class="info-card__icon icon_testing">
                <use href="/assets/sprites.svg#testing-icon"></use>
              </svg>
              <h3 class="info-card__title">Testing</h3>
              <div class="info-card__description">
                Providing best quality of things developed by us for customers.
              </div>
            </figure>

            <figure class="info-card card_integration">
              <svg class="info-card__icon icon_integration">
                <use href="/assets/sprites.svg#integration-icon"></use>
              </svg>
              <h3 class="info-card__title">Integration</h3>
              <div class="info-card__description">
                Solutions that go with the times to improve businesses and give customers best experience.
              </div>
            </figure>

          </div>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
